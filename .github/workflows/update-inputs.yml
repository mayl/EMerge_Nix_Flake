name: Update flake inputs

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update flake inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/update-flake-lock@v23
        with:
          pr-title: 'chore: update flake inputs'
          pr-labels: dependencies
